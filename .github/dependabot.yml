version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current via reviewed PRs.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /fulcrum-ml
    schedule:
      interval: weekly
