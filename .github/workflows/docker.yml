name: Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (blank = auto-increment YYYY.M.PATCH from latest tag)"
        required: false
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: write # push the version tag that drives auto-increment

jobs:
  docker:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          NEEDS_TAG=true
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ "$EVENT_NAME" = "workflow_run" ]; then
            VERSION="$(git describe --tags --abbrev=0)"   # Release already tagged
            NEEDS_TAG=false
          else
            VERSION="$(./scripts/next-version.sh)"
          fi
          [ -n "$VERSION" ] || { echo "::error::could not resolve a version"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "needs_tag=$NEEDS_TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push fulcrum (Go core)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fulcrum:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fulcrum:${{ steps.version.outputs.version }}

      - name: Build and push fulcrum-ml (sidecar)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./fulcrum-ml
          file: ./fulcrum-ml/Dockerfile
          # onnxruntime/insightface are impractical on 32-bit arm — amd64/arm64 only.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fulcrum-ml:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fulcrum-ml:${{ steps.version.outputs.version }}

      # Tag AFTER a successful push so the next manual run increments. Skipped
      # for Release-driven runs (the Release workflow owns its tag).
      - name: Tag published version
        if: steps.version.outputs.needs_tag == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
